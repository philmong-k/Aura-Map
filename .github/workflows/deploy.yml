name: Aura-Map Tactical Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 전술 코드 체크아웃
      uses: actions/checkout@v4

    - name: Node.js 환경 구축
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 의존성 보급 (Install)
      run: npm install

    - name: 전술 엔진 빌드 (Build)
      run: npm run build

    # 향후 배포 단계(GitHub Pages 등)를 여기에 추가할 수 있습니다.
