name: Agent Canvas Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    # 이 컴퓨터의 self-hosted 러너를 사용합니다.
    runs-on: self-hosted

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: Node.js 환경 구축
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 의존성 설치
      run: npm install

    - name: 프론트엔드 빌드
      run: npm run build

    - name: 프론트엔드 서버 업로드
      shell: powershell
      run: |
        scp -o StrictHostKeyChecking=accept-new -r dist/* philmong@100.95.147.38:/home/philmong/apps/agent-canvas/
        # scp가 새로 만드는 디렉터리를 700으로 만들어 nginx(www-data)가 못 읽는 문제 방지
        ssh -o StrictHostKeyChecking=accept-new philmong@100.95.147.38 "chmod -R 755 /home/philmong/apps/agent-canvas"

    - name: 백엔드 서버 업로드
      shell: powershell
      run: |
        scp -o StrictHostKeyChecking=accept-new server/index.ts server/db.ts philmong@100.95.147.38:/home/philmong/apps/agent-canvas-api/server/
        scp -o StrictHostKeyChecking=accept-new package.json package-lock.json philmong@100.95.147.38:/home/philmong/apps/agent-canvas-api/

    - name: 백엔드 의존성 설치 및 재시작
      shell: powershell
      run: |
        ssh -o StrictHostKeyChecking=accept-new philmong@100.95.147.38 "cd /home/philmong/apps/agent-canvas-api && npm install --omit=dev --omit=optional && npm install tsx && pm2 restart agent-canvas-api"

    - name: 완료
      shell: powershell
      run: Write-Host "✅ https://philmong.co.kr/canvas/ 로 배포되었습니다."
