name: Aura-Map Tactical Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    # 지휘관님의 로컬 PC 러너를 사용합니다.
    runs-on: self-hosted

    steps:
    - name: 전술 코드 체크아웃
      uses: actions/checkout@v4

    - name: Node.js 환경 구축
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 의존성 보급 (Install)
      run: npm install

    - name: 전술 엔진 빌드 (Build)
      run: npm run build

    - name: WSL2 영토로 배포 (Deploy to Nginx)
      shell: pwsh
      run: |
        # 빌드된 dist 폴더를 WSL2 내부의 Nginx 웹 루트로 복사
        wsl -d Ubuntu rm -rf /var/www/aura-map/*
        wsl -d Ubuntu cp -r ./dist/* /var/www/aura-map/
        echo "✅ Aura-Map이 dev.philmong.co.kr/canvas/ 경로로 배포되었습니다."
